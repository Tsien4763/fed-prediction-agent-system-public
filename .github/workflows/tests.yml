name: tests

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,agent]"
      - name: Compile sources
        run: python -m compileall -q src scripts tests
      - name: Ruff static checks
        run: ruff check src scripts tests
      - name: Unit tests
        env:
          PYTHONPATH: src
        run: pytest -q
      - name: Check CLI
        env:
          PYTHONPATH: src
        run: |
          python -m fed_game.cli --help
          python -m fed_game.cli status
      - name: Hardening smoke
        env:
          PYTHONPATH: src
        run: python scripts/smoke_hardening.py
      - name: Realtime closed-loop smoke
        env:
          PYTHONPATH: src
        run: python scripts/smoke_realtime_pipeline.py
