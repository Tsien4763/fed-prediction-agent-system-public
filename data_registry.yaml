{
  "project": {
    "name": "fed-prediction-agent-system",
    "date_range": {
      "start_year": 2000,
      "end_year": 2026
    },
    "countries": [
      {
        "code": "USA",
        "name": "United States",
        "policy_actor": "Federal Reserve",
        "cluster": "fed"
      },
      {
        "code": "CHN",
        "name": "China",
        "policy_actor": "People's Bank of China",
        "cluster": "pboc"
      },
      {
        "code": "GBR",
        "name": "United Kingdom",
        "policy_actor": "Bank of England",
        "cluster": "boe"
      },
      {
        "code": "RUS",
        "name": "Russia",
        "policy_actor": "Bank of Russia",
        "cluster": "bank_of_russia"
      },
      {
        "code": "FRA",
        "name": "France / Euro Area",
        "policy_actor": "ECB + Banque de France",
        "cluster": "france_euro"
      }
    ]
  },
  "bulk_downloads": [
    {
      "id": "wdi_bulk_csv",
      "dataset": "World Development Indicators",
      "provider": "World Bank",
      "country_scope": "all",
      "type": "development_indicators",
      "frequency": "bulk_snapshot",
      "url": "https://databank.worldbank.org/data/download/WDI_CSV.zip",
      "target_path": "raw/wdi/WDI_CSV.zip",
      "method": "http_stream",
      "range_chunk_bytes": 8388608,
      "min_bytes": 250000000,
      "validate_zip": true,
      "notes": "Official WDI bulk CSV ZIP; source redirects to databankfiles.worldbank.org."
    },
    {
      "id": "weo_apr_2026_excel",
      "dataset": "World Economic Outlook",
      "provider": "IMF",
      "country_scope": "all",
      "type": "macro_forecast_panel",
      "frequency": "semiannual_snapshot",
      "url": "https://data.imf.org/-/media/iData/External-Storage/Documents/2F78EE59F79143A7921E5E203D3AAA80/en/WEOApr2026all.xlsx",
      "target_path": "raw/weo/WEOApr2026all.xlsx",
      "method": "http_stream",
      "min_bytes": 1000000,
      "validate_zip": false,
      "fallback_urls": [
        "https://data.imf.org/en/datasets/IMF.RES%3AWEO",
        "https://www.imf.org/external/datamapper/datasets/weo"
      ],
      "notes": "Official April 2026 WEO entire dataset. Some shell/network exits may receive Akamai 403; status is logged instead of silently succeeding."
    },
    {
      "id": "weo_data360_api",
      "dataset": "World Economic Outlook",
      "provider": "World Bank Data360 mirror of IMF WEO",
      "country_scope": "five_powers",
      "type": "macro_forecast_panel",
      "frequency": "api_snapshot",
      "url": "https://data360api.worldbank.org/data360/data?DATABASE_ID=IMF_WEO",
      "target_path": "raw/weo/weo_data360_panel.json",
      "method": "data360_api",
      "min_bytes": 1000,
      "validate_zip": false,
      "notes": "Fallback official API path for WEO indicators when IMF Excel/DataMapper endpoints are blocked by Akamai."
    },
    {
      "id": "bis_central_bank_speeches",
      "dataset": "Central bankers' speeches",
      "provider": "BIS",
      "country_scope": "global",
      "type": "policy_text",
      "frequency": "bulk_snapshot",
      "url": "https://www.bis.org/speeches/speeches.zip",
      "target_path": "raw/policy_text/bis_speeches.zip",
      "method": "http_stream",
      "min_bytes": 100000000,
      "validate_zip": true,
      "notes": "BIS pre-compiled full text extract of central banker speeches since 1996."
    }
  ],
