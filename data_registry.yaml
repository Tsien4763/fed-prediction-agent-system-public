  "wdi_indicator_selection": {
    "top_n": 100,
    "countries": ["USA", "CHN", "GBR", "RUS", "FRA"],
    "score_weights": {
      "economic_relevance": 0.35,
      "country_coverage": 0.25,
      "time_coverage": 0.15,
      "non_redundancy": 0.15,
      "policy_predictive_gain": 0.10
